<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Musiculous Library{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-a: #07101a;
            --bg-b: #10263a;
            --panel: rgba(8, 16, 26, 0.82);
            --line: rgba(255, 255, 255, 0.14);
            --text: #f3f8ff;
            --muted: #a8bbd3;
            --accent: #19d4b5;
            --accent-alt: #ff8c42;
            --danger: #ff5d6c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 420px at 0% 0%, rgba(25, 212, 181, 0.24), transparent 58%),
                radial-gradient(900px 420px at 100% 0%, rgba(255, 140, 66, 0.2), transparent 58%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
            padding: 28px 16px;
        }

        .page {
            width: min(980px, 100%);
            margin: 0 auto;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--panel);
            backdrop-filter: blur(7px);
            box-shadow: 0 24px 44px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            animation: rise 320ms ease-out;
        }

        header {
            padding: 22px 22px 14px;
            border-bottom: 1px solid var(--line);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            margin: 0;
            font-family: "Sora", sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.01em;
        }

        .sub {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn,
        button {
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            font-family: inherit;
            font-size: 0.92rem;
            padding: 9px 12px;
            text-decoration: none;
            cursor: pointer;
            transition: 160ms ease;
        }

        .btn.primary,
        button.primary {
            border-color: transparent;
            color: #04231f;
            background: linear-gradient(135deg, #19d4b5, #74f0da);
            font-weight: 600;
        }

        .btn.warn,
        button.warn {
            border-color: transparent;
            color: #fff;
            background: linear-gradient(135deg, #db4961, #ff7b7b);
        }

        .btn:hover,
        button:hover { transform: translateY(-1px); }

        main { padding: 20px 22px 24px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            background: rgba(8, 13, 22, 0.65);
        }

        .label {
            display: inline-block;
            border-radius: 99px;
            font-size: 0.75rem;
            padding: 4px 8px;
            border: 1px solid var(--line);
            color: var(--muted);
        }

        .muted { color: var(--muted); }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(3, 10, 17, 0.72);
            color: var(--text);
            font: inherit;
            padding: 10px 11px;
            margin-top: 6px;
            margin-bottom: 12px;
        }

        textarea { min-height: 110px; resize: vertical; }

        .error {
            border: 1px solid rgba(255, 93, 108, 0.45);
            color: #ffccd3;
            background: rgba(74, 15, 25, 0.5);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            header, main { padding: 14px; }
            .title { font-size: 1.08rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div>
                <h1 class="title">Musiculous AI Library</h1>
                <p class="sub">Hi {{ request.user.username|default:"Guest" }}, manage your generated tracks.</p>
            </div>
            <nav>
                <a class="btn" href="{% url 'home' %}">Account Home</a>
                <a class="btn primary" href="{% url 'song_create' %}">Create Song</a>
                <a class="btn" href="{% url 'library_home' %}">My Library</a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
